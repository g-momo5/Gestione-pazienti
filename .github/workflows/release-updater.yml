name: Release Updater Assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag release (es. v1.2.3)'
        required: true
        type: string

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install Windows bundler deps
        if: runner.os == 'Windows'
        run: |
          choco install -y nsis
          choco install -y wixtoolset
          rustup target add x86_64-pc-windows-msvc

      - name: Build app
        run: npm run tauri:build

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp src-tauri/target/release/bundle/nsis/*.exe release-assets/
          else
            cp src-tauri/target/release/bundle/dmg/*.dmg release-assets/
          fi
          ls -la release-assets

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ runner.os }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate update-manifest.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          NOW_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          WIN_ASSET="$(find release-assets -type f -name '*.exe' | head -n1 | xargs -I{} basename "{}")"
          MAC_ASSET="$(find release-assets -type f -name '*.dmg' | head -n1 | xargs -I{} basename "{}")"

          if [[ -z "${WIN_ASSET}" || -z "${MAC_ASSET}" ]]; then
            echo "Asset mancanti (exe/dmg) per generare update-manifest.json"
            exit 1
          fi

          cat > release-assets/update-manifest.json <<EOF
          {
            "version": "${VERSION}",
            "publishedAt": "${NOW_UTC}",
            "notes": "Aggiornamento versione ${VERSION}",
            "assets": {
              "windows": "https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${WIN_ASSET}",
              "macos": "https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${MAC_ASSET}"
            }
          }
          EOF

          cat release-assets/update-manifest.json

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/update-manifest.json
