name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build (windows-latest)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install Windows bundler deps
        run: |
          choco install -y nsis
          choco install -y wixtoolset
          rustup target add x86_64-pc-windows-msvc

      - name: Build app
        run: npm run tauri:build

      - name: Collect Windows assets
        id: collect_assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          EXE_PATH="$(ls -1 src-tauri/target/release/bundle/nsis/*.exe | head -n1)"
          if [[ -z "${EXE_PATH}" ]]; then
            echo "Nessun installer .exe trovato in src-tauri/target/release/bundle/nsis"
            exit 1
          fi
          EXE_NAME="$(basename "${EXE_PATH}")"
          cp "${EXE_PATH}" "release-assets/${EXE_NAME}"
          echo "exe_path=release-assets/${EXE_NAME}" >> "$GITHUB_OUTPUT"
          echo "exe_name=${EXE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: tavi-windows
          path: release-assets/*.exe

      - name: Decide release mode from app version
        if: github.event_name != 'pull_request'
        id: release_plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');

            const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            const appVersion = String(config?.package?.version || '').trim();
            if (!appVersion) {
              core.setFailed('Versione app mancante in src-tauri/tauri.conf.json (package.version).');
              return;
            }

            const parseVersion = (value) =>
              String(value)
                .replace(/^v/, '')
                .split('-')[0]
                .split('.')
                .map((part) => Number(part));

            const compareVersions = (a, b) => {
              const pa = parseVersion(a);
              const pb = parseVersion(b);
              const len = Math.max(pa.length, pb.length);
              for (let i = 0; i < len; i++) {
                const av = Number.isFinite(pa[i]) ? pa[i] : 0;
                const bv = Number.isFinite(pb[i]) ? pb[i] : 0;
                if (av > bv) return 1;
                if (av < bv) return -1;
              }
              return 0;
            };

            let latestTag = null;
            try {
              const latest = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              latestTag = latest.data.tag_name;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const targetTag = `v${appVersion}`;
            let mode = 'create-first-release';

            if (latestTag) {
              const cmp = compareVersions(appVersion, latestTag);
              if (cmp > 0) {
                mode = 'create-new-release';
              } else if (cmp === 0) {
                mode = 'replace-latest-release-assets';
              } else {
                core.setFailed(
                  `Versione app ${appVersion} inferiore all'ultima release ${latestTag}. ` +
                  'Aumenta la versione prima di pubblicare.'
                );
                return;
              }
            }

            core.info(
              `Release mode: ${mode}; appVersion=${appVersion}; latestTag=${latestTag || 'none'}; targetTag=${targetTag}`
            );
            core.setOutput('app_version', appVersion);
            core.setOutput('target_tag', targetTag);
            core.setOutput('mode', mode);

      - name: Generate update-manifest.json (Windows)
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          APP_VERSION: ${{ steps.release_plan.outputs.app_version }}
          TARGET_TAG: ${{ steps.release_plan.outputs.target_tag }}
          EXE_NAME: ${{ steps.collect_assets.outputs.exe_name }}
        run: |
          set -euo pipefail
          NOW_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > release-assets/update-manifest.json <<EOF
          {
            "version": "${APP_VERSION}",
            "publishedAt": "${NOW_UTC}",
            "notes": "Aggiornamento versione ${APP_VERSION}",
            "assets": {
              "windows": "https://github.com/${{ github.repository }}/releases/download/${TARGET_TAG}/${EXE_NAME}"
            }
          }
          EOF
          cat release-assets/update-manifest.json

      - name: Publish Windows release on GitHub
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_plan.outputs.target_tag }}
          name: ${{ steps.release_plan.outputs.target_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/*.exe
            release-assets/update-manifest.json
